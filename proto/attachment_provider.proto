syntax = "proto3";

package openshell.attachment.v1;

// Generic attachment provider contract consumed by compute lifecycle extensions.
//
// The provider owns external resources for many OpenShell sandboxes: VF/vDPA
// allocation, rootfs exposure, representor discovery, OVS/OpenFlow or
// equivalent switch programming, and cleanup. Compute drivers remain responsible
// for launching workloads; they ask the provider for typed attachments and
// translate the returned plan into their local launch mechanism.
service AttachmentProvider {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc Attach(AttachRequest) returns (AttachResponse);
  rpc Detach(DetachRequest) returns (DetachResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Reconcile(ReconcileRequest) returns (ReconcileResponse);
}

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  string message = 2;
  repeated string capabilities = 3;
}

message AttachRequest {
  string sandbox_id = 1;
  string sandbox_name = 2;
  optional string image_ref = 3;
  string consumer = 4;
  RootfsConfig rootfs = 5;
  repeated NetworkAttachment network = 6;
  repeated DeviceAttachment devices = 7;
}

message AttachResponse {
  AttachmentLease lease = 1;
}

message DetachRequest {
  AttachmentLease lease = 1;
}

message DetachResponse {}

message ListRequest {}

message ListResponse {
  repeated AttachmentLease leases = 1;
}

message ReconcileRequest {
  AttachmentLease lease = 1;
}

message ReconcileResponse {
  ReconcileOutcome outcome = 1;
  string reason = 2;
}

enum ReconcileOutcome {
  RECONCILE_OUTCOME_UNSPECIFIED = 0;
  RECONCILE_OUTCOME_CONTINUE = 1;
  RECONCILE_OUTCOME_SKIP_RESTORE = 2;
}

message AttachmentLease {
  string attachment_id = 1;
  uint64 generation = 2;
  AttachmentPlan plan = 3;
  map<string, string> metadata = 4;
}

message AttachmentPlan {
  bool replace_network = 1;
  repeated NetworkAttachment network = 2;
  repeated DeviceAttachment devices = 3;
  RootfsConfig rootfs = 4;
  repeated string env = 5;
}

message RootfsConfig {
  StorageAttachment root = 1;
  StorageAttachment overlay = 2;
  StorageAttachment image = 3;
}

message StorageAttachment {
  oneof kind {
    HostFileStorageAttachment host_file = 1;
    HostBlockDeviceStorageAttachment host_block_device = 2;
    ProviderProvisionedStorageAttachment provider_provisioned = 3;
  }
}

message HostFileStorageAttachment {
  string path = 1;
  bool read_only = 2;
}

message HostBlockDeviceStorageAttachment {
  string path = 1;
  bool read_only = 2;
}

message ProviderProvisionedStorageAttachment {
  string id = 1;
  string device = 2;
  bool read_only = 3;
}

message NetworkAttachment {
  oneof kind {
    TapNetworkAttachment tap = 1;
    VfioPciNetworkAttachment vfio_pci = 2;
    VdpaNetworkAttachment vdpa = 3;
  }
}

message TapNetworkAttachment {
  string ifname = 1;
  string guest_ip = 2;
  string host_ip = 3;
  string mac = 4;
  optional uint32 gateway_port = 5;
}

message VfioPciNetworkAttachment {
  string bdf = 1;
  optional string mac = 2;
}

message VdpaNetworkAttachment {
  string device = 1;
  optional string mac = 2;
}

message DeviceAttachment {
  oneof kind {
    VfioPciDeviceAttachment vfio_pci = 1;
    VsockDeviceAttachment vsock = 2;
  }
}

message VfioPciDeviceAttachment {
  string bdf = 1;
  optional string id = 2;
}

message VsockDeviceAttachment {
  uint32 cid = 1;
}
